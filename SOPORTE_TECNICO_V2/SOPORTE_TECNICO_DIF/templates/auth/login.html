{% extends "base.html" %}

{% block title %} ITIL Helpdesk{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="ITIL Helpdesk">
            </div>
            <h1 class="login-title">ITIL Helpdesk</h1>
            <p class="login-subtitle"></p>
            <p class="login-subtitle">Sistema de Gestión de Tickets</p>
        </div>

        <div class="login-body">
            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email"
                           class="form-control"
                           id="email"
                           name="email"
                           placeholder="usuario@empresa.com"
                           required
                           autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="••••••••" 
                           required>
                </div>

                <button type="submit" class="btn login-btn">
                    Entrar
                </button>
            </form>


        <div class="login-footer">
            © 2026 ITIL Helpdesk. Todos los derechos reservados.
        </div>
    </div>
</div>
{% endblock %}
