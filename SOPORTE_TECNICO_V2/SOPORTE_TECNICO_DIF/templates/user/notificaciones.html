<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notificaciones </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notificaciones.css') }}">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">🔔 Notificaciones</h3>

        <button class="btn btn-outline-primary btn-sm" onclick="marcarLeidas()">
            Marcar todas como leídas
        </button>
    </div>

    {% if notificaciones %}
        <div class="list-group shadow-sm">

            {% for n in notificaciones %}
                <a href="{{ n.url_accion or '#' }}"
                   class="list-group-item list-group-item-action notificacion-item {% if not n.leida %}no-leida{% endif %}">

                    <div class="d-flex w-100 justify-content-between">
                        <h6 class="mb-1 fw-bold">{{ n.titulo }}</h6>
                        <small class="text-muted">{{ n.fecha_fmt }}</small>
                    </div>

                    <p class="mb-1 text-muted">
                        {{ n.mensaje }}
                    </p>

                    <span class="badge bg-secondary">
                        {{ n.tipo }}
                    </span>

                </a>
            {% endfor %}

        </div>
    {% else %}
        <div class="alert alert-info text-center">
            No tienes notificaciones
        </div>
    {% endif %}

</div>

<script>
function marcarLeidas() {
    fetch("/api/notificaciones/marcar-leidas", {
        method: "POST"
    }).then(() => location.reload());
}
</script>

</body>
</html>
